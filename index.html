<!DOCTYPE html>
<!--
  ============================================================
  DASHBOARD PERSONALE - pagina iniziale del browser
  ============================================================
  Tutto (HTML + CSS + JavaScript) sta in questo unico file.
  Non serve internet per l'orologio, le note e i link:
  serve solo per il meteo (che usa Open-Meteo, senza chiavi).

  Per personalizzare cerca i blocchi contrassegnati con
  "PERSONALIZZA" -> sono tutti raggruppati all'inizio del CSS
  e all'inizio del JavaScript, cosi' non devi toccare altro.
  ============================================================
-->
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!-- viewport: dice al telefono di usare la larghezza reale dello schermo.
       Senza questa riga la pagina su mobile risulterebbe rimpicciolita. -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La mia dashboard</title>

  <!-- Icona della scheda del browser. E' un'immagine disegnata al volo
       dentro l'indirizzo stesso (nessun file esterno da caricare).
       Per cambiarla sostituisci l'emoji fra i due tag <text>. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9200;</text></svg>">

<style>
/* ============================================================
   1) PERSONALIZZA I COLORI
   ------------------------------------------------------------
   Queste sono "variabili CSS": scrivi il colore una volta qui
   e viene usato in tutta la pagina. Cambia solo questi valori
   per cambiare completamente l'aspetto.
   I colori sono in formato esadecimale (#RRGGBB).
   ============================================================ */
:root {
  --sfondo:          #0f1220;  /* colore di fondo della pagina        */
  --sfondo-scheda:   #191d33;  /* fondo dei riquadri (le "card")      */
  --bordo:           #2a3050;  /* linee sottili e bordi               */
  --testo:           #e7e9f5;  /* testo principale                    */
  --testo-tenue:     #9aa1c4;  /* testo secondario, meno importante   */
  --accento:         #6c8cff;  /* colore principale: azzurro/viola    */
  --accento-2:       #46e0b8;  /* colore secondario: verde acqua      */
  --errore:          #ff6b81;  /* rosso per errori e pulsante elimina */
  --raggio:          16px;     /* quanto sono arrotondati gli angoli  */
  --font: "Segoe UI", system-ui, -apple-system, Roboto, Arial, sans-serif;
}
/* FINE della parte da personalizzare per i colori.
   Da qui in poi c'e' solo l'impaginazione: puoi lasciarla com'e'. */


/* ---- Azzeramento di base -------------------------------------
   Il browser mette margini e spazi suoi: li togliamo per partire
   da una base uguale su tutti i browser.
   "box-sizing: border-box" fa si' che larghezza = contenuto +
   bordo + padding (molto piu' intuitivo da gestire).            */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--sfondo);
  color: var(--testo);
  min-height: 100vh;          /* almeno tutta l'altezza dello schermo */
  padding: 24px 16px 48px;
  /* Sfumature decorative di sfondo (due aloni colorati sfumati). */
  background-image:
    radial-gradient(900px 500px at 15% -10%, #6c8cff22, transparent),
    radial-gradient(800px 500px at 90% 0%,  #46e0b81f, transparent);
  background-attachment: fixed;
}

/* Contenitore centrale: non piu' largo di 1100px e centrato. */
.contenitore { max-width: 1100px; margin: 0 auto; }


/* ---- Intestazione: saluto, orologio, data ---- */
.intestazione { text-align: center; margin-bottom: 32px; }

#saluto {
  font-size: 1.5rem;
  color: var(--testo-tenue);
  font-weight: 500;
}

#orologio {
  /* clamp(minimo, valore-ideale, massimo): il carattere si adatta
     alla larghezza dello schermo restando dentro dei limiti.
     "vw" = 1% della larghezza della finestra.                    */
  font-size: clamp(2.8rem, 11vw, 5.5rem);
  font-weight: 200;
  line-height: 1.05;
  letter-spacing: 2px;
  /* Testo colorato con una sfumatura invece che a tinta unita. */
  background: linear-gradient(90deg, var(--accento), var(--accento-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-variant-numeric: tabular-nums; /* le cifre non "ballano" */
}

#data { color: var(--testo-tenue); font-size: 1.05rem; }
/* Solo la PRIMA lettera maiuscola: "domenica 19 luglio 2026" ->
   "Domenica 19 luglio 2026". Con "capitalize" verrebbe maiuscola
   anche l'iniziale del mese, che in italiano si scrive minuscola. */
#data::first-letter { text-transform: uppercase; }


/* ---- Griglia delle schede ------------------------------------
   "auto-fit" + "minmax(280px, 1fr)" e' la riga magica del
   responsive: le colonne si creano da sole e vanno a capo
   quando lo spazio scende sotto i 280px. Su telefono si
   ottiene automaticamente una sola colonna.                     */
.griglia {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 18px;
}

.scheda {
  background: var(--sfondo-scheda);
  border: 1px solid var(--bordo);
  border-radius: var(--raggio);
  padding: 20px;
  transition: border-color .2s, transform .2s;
}
.scheda:hover { border-color: var(--accento); }

.titolo-scheda {
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--testo-tenue);
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}


/* ---- Meteo ---- */
.meteo-riga { display: flex; align-items: center; gap: 16px; }
.meteo-icona { font-size: 3.4rem; line-height: 1; }
.meteo-gradi { font-size: 2.6rem; font-weight: 300; }
.meteo-desc  { color: var(--testo-tenue); font-size: .95rem; }
.meteo-extra {
  margin-top: 14px;
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  font-size: .85rem;
  color: var(--testo-tenue);
}


/* ---- Lista To Do ---- */
.todo-form { display: flex; gap: 8px; margin-bottom: 14px; }

input[type="text"] {
  flex: 1;                      /* occupa tutto lo spazio libero */
  background: #0d1024;
  border: 1px solid var(--bordo);
  border-radius: 10px;
  padding: 11px 13px;
  color: var(--testo);
  font-family: inherit;
  font-size: .95rem;
}
input[type="text"]:focus { outline: 2px solid var(--accento); border-color: transparent; }

.bottone {
  background: var(--accento);
  color: #0b0e1c;
  border: none;
  border-radius: 10px;
  padding: 11px 16px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  font-family: inherit;
}
.bottone:hover { filter: brightness(1.12); }

#lista-todo { list-style: none; }   /* via i pallini dell'elenco */

#lista-todo li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--bordo);
}
#lista-todo li:last-child { border-bottom: none; }

#lista-todo input[type="checkbox"] {
  width: 19px; height: 19px;
  accent-color: var(--accento-2);   /* colore della spunta */
  cursor: pointer;
  flex-shrink: 0;
}

.testo-todo { flex: 1; word-break: break-word; font-size: .96rem; }

/* Quando l'attivita' e' completata la barriamo e la sbiadiamo. */
.completata .testo-todo { text-decoration: line-through; color: var(--testo-tenue); opacity: .6; }

.elimina {
  background: none;
  border: none;
  color: var(--testo-tenue);
  cursor: pointer;
  font-size: 1.15rem;
  line-height: 1;
  padding: 4px 6px;
}
.elimina:hover { color: var(--errore); }

.vuoto { color: var(--testo-tenue); font-size: .9rem; padding: 8px 0; }


/* ---- Blocco note libero ---- */
#blocco-note {
  width: 100%;
  min-height: 150px;
  background: #0d1024;
  border: 1px solid var(--bordo);
  border-radius: 10px;
  padding: 12px 13px;
  color: var(--testo);
  font-family: inherit;
  font-size: .95rem;
  line-height: 1.55;
  resize: vertical;        /* si puo' allargare solo in altezza */
}
#blocco-note:focus { outline: 2px solid var(--accento); border-color: transparent; }

#stato-note { font-size: .72rem; color: var(--testo-tenue); }


/* ---- Timer ---- */
.timer-display {
  font-size: clamp(2.6rem, 13vw, 3.6rem);
  font-weight: 200;
  text-align: center;
  font-variant-numeric: tabular-nums;   /* le cifre non ballano */
  letter-spacing: 2px;
  margin: 4px 0 14px;
}
/* Quando il timer e' in pausa lo sbiadiamo, cosi' si capisce a colpo d'occhio. */
.in-pausa .timer-display { opacity: .45; }
/* Negli ultimi 60 secondi diventa rosso e lampeggia piano. */
.in-scadenza .timer-display { color: var(--errore); animation: pulsa 1s infinite; }
@keyframes pulsa { 50% { opacity: .45; } }

.timer-fase { text-align: center; color: var(--testo-tenue); font-size: .85rem; margin-bottom: 10px; }

.timer-comandi { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

.timer-preset { display: flex; gap: 6px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }

/* Il preset attualmente selezionato si evidenzia. */
.timer-preset .mini-bottone.attivo {
  color: var(--accento);
  border-color: var(--accento);
  background: #6c8cff1a;
}


/* ---- Link rapidi ---- */
.link-griglia {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
  gap: 10px;
}

.link-griglia a {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding: 14px 6px;
  background: #0d1024;
  border: 1px solid var(--bordo);
  border-radius: 12px;
  text-decoration: none;
  color: var(--testo);
  font-size: .78rem;
  text-align: center;
  transition: transform .15s, border-color .15s;
}
.link-griglia a:hover { transform: translateY(-3px); border-color: var(--accento); }
.link-griglia .emoji { font-size: 1.7rem; }


/* ---- Cambio euro / yen ---- */

/* Il valore grande. Nota: NIENTE tabular-nums qui.
   Le cifre a larghezza fissa servono nelle colonne di numeri da
   allineare (come l'orologio); su un numero grande isolato fanno
   sembrare le cifre distanziate male. */
.cambio-valore {
  font-size: 2.4rem;
  font-weight: 600;
  line-height: 1.1;
}
.cambio-unita { font-size: 1.1rem; color: var(--testo-tenue); font-weight: 400; margin-left: 4px; }

/* La variazione resta in colore neutro, non verde/rosso: su un
   cambio valutario "sale" non vuol dire ne' bene ne' male, dipende
   se stai comprando o vendendo. La freccia dice gia' la direzione. */
.cambio-delta { font-size: .9rem; color: var(--testo-tenue); margin-top: 6px; }

.cambio-grafico { margin-top: 14px; position: relative; }
.cambio-grafico svg { display: block; width: 100%; }

/* Riquadro che compare passando il mouse sui punti del grafico. */
.cambio-tooltip {
  position: absolute;
  pointer-events: none;          /* non deve intercettare il mouse */
  background: #0d1024;
  border: 1px solid var(--bordo);
  border-radius: 8px;
  padding: 6px 9px;
  font-size: .75rem;
  white-space: nowrap;
  transform: translate(-50%, -130%);
  opacity: 0;
  transition: opacity .12s;
  z-index: 2;
}
.cambio-tooltip.visibile { opacity: 1; }
.cambio-tooltip b { font-variant-numeric: tabular-nums; }

.cambio-note {
  margin-top: 10px;
  font-size: .75rem;
  color: var(--testo-tenue);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}


/* ---- Notizie ANSA ---- */
.news-categorie {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.news-categorie .mini-bottone.attivo {
  color: var(--accento);
  border-color: var(--accento);
  background: #6c8cff1a;
}

#elenco-news { list-style: none; }

#elenco-news li { border-bottom: 1px solid var(--bordo); }
#elenco-news li:last-child { border-bottom: none; }

#elenco-news a {
  display: block;
  padding: 10px 0;
  color: var(--testo);
  text-decoration: none;
  font-size: .93rem;
  line-height: 1.45;
}
#elenco-news a:hover { color: var(--accento); }

.news-ora { color: var(--testo-tenue); font-size: .74rem; margin-right: 7px; }

/* Su schermi larghi la scheda notizie occupa due colonne:
   i titoli sono lunghi e stanno meglio distesi. */
@media (min-width: 980px) { .scheda-notizie { grid-column: span 2; } }


/* ---- Citazione ---- */
.citazione {
  font-size: 1.08rem;
  line-height: 1.6;
  font-style: italic;
  border-left: 3px solid var(--accento-2);
  padding-left: 14px;
}
.autore { margin-top: 10px; color: var(--testo-tenue); font-size: .88rem; }

/* La scheda della citazione occupa tutta la larghezza della griglia
   solo quando c'e' spazio (schermi larghi). "1 / -1" = da prima
   colonna a ultima. */
@media (min-width: 720px) { .scheda-larga { grid-column: 1 / -1; } }

.mini-bottone {
  background: none;
  border: 1px solid var(--bordo);
  color: var(--testo-tenue);
  border-radius: 8px;
  padding: 4px 9px;
  font-size: .72rem;
  cursor: pointer;
  font-family: inherit;
}
.mini-bottone:hover { color: var(--accento); border-color: var(--accento); }


/* ---- Ritocchi per telefoni molto stretti ---- */
@media (max-width: 420px) {
  body { padding: 16px 10px 32px; }
  .scheda { padding: 16px; }
  #saluto { font-size: 1.2rem; }
}
</style>
</head>

<body>
<div class="contenitore">

  <!-- ===== INTESTAZIONE: saluto + orologio + data ===== -->
  <header class="intestazione">
    <p id="saluto">Ciao!</p>
    <div id="orologio">--:--:--</div>
    <p id="data">caricamento...</p>
  </header>

  <!-- ===== GRIGLIA DELLE SCHEDE ===== -->
  <div class="griglia">

    <!-- --- Scheda METEO --- -->
    <section class="scheda">
      <h2 class="titolo-scheda">
        <span>Meteo &middot; <span id="nome-citta">...</span></span>
        <button class="mini-bottone" id="btn-aggiorna-meteo">aggiorna</button>
      </h2>
      <div id="meteo-contenuto">
        <p class="vuoto">Carico i dati meteo...</p>
      </div>
    </section>

    <!-- --- Scheda TO DO --- -->
    <section class="scheda">
      <h2 class="titolo-scheda">
        <span>Da fare</span>
        <span id="contatore-todo"></span>
      </h2>

      <!-- form: premendo Invio nella casella si aggiunge l'attivita' -->
      <form class="todo-form" id="form-todo">
        <input type="text" id="campo-todo" placeholder="Cosa devi fare?" autocomplete="off">
        <button type="submit" class="bottone">+</button>
      </form>

      <ul id="lista-todo"></ul>
    </section>

    <!-- --- Scheda TIMER --- -->
    <section class="scheda" id="scheda-timer">
      <h2 class="titolo-scheda"><span>Timer</span><span id="giri-timer"></span></h2>

      <p class="timer-fase" id="fase-timer">Concentrazione</p>
      <div class="timer-display" id="display-timer">25:00</div>

      <div class="timer-comandi">
        <button class="bottone" id="btn-avvia">Avvia</button>
        <button class="mini-bottone" id="btn-azzera">azzera</button>
      </div>

      <!-- I pulsanti sotto cambiano la durata. data-minuti e' un
           "attributo dati": un valore che ci appuntiamo sull'elemento
           e che il JavaScript rilegge al clic. -->
      <div class="timer-preset">
        <button class="mini-bottone attivo" data-minuti="25" data-fase="Concentrazione">25 min</button>
        <button class="mini-bottone" data-minuti="5"  data-fase="Pausa breve">5 min</button>
        <button class="mini-bottone" data-minuti="15" data-fase="Pausa lunga">15 min</button>
        <button class="mini-bottone" data-minuti="50" data-fase="Sessione lunga">50 min</button>
      </div>
    </section>

    <!-- --- Scheda BLOCCO NOTE --- -->
    <section class="scheda">
      <h2 class="titolo-scheda">
        <span>Blocco note</span>
        <span id="stato-note"></span>
      </h2>
      <textarea id="blocco-note" placeholder="Scrivi qui quello che vuoi: si salva da solo."></textarea>
    </section>

    <!-- --- Scheda LINK RAPIDI --- -->
    <section class="scheda">
      <h2 class="titolo-scheda"><span>Link rapidi</span></h2>
      <div class="link-griglia" id="link-rapidi"></div>
    </section>

    <!-- --- Scheda CAMBIO EURO / YEN --- -->
    <section class="scheda">
      <h2 class="titolo-scheda">
        <span>Cambio euro / yen</span>
        <button class="mini-bottone" id="btn-aggiorna-cambio">aggiorna</button>
      </h2>
      <div id="cambio-contenuto">
        <p class="vuoto">Carico il cambio...</p>
      </div>
    </section>

    <!-- --- Scheda NOTIZIE (ANSA) --- -->
    <section class="scheda scheda-notizie">
      <h2 class="titolo-scheda">
        <span>Notizie &middot; ANSA</span>
        <span id="stato-news"></span>
      </h2>
      <!-- I pulsanti delle categorie li crea il JavaScript,
           in base a quello che trova nel file delle notizie. -->
      <div class="news-categorie" id="categorie-news"></div>
      <ul id="elenco-news">
        <li class="vuoto">Carico le notizie...</li>
      </ul>
    </section>

    <!-- --- Scheda CITAZIONE --- -->
    <section class="scheda scheda-larga">
      <h2 class="titolo-scheda">
        <span>Pensiero del momento</span>
        <button class="mini-bottone" id="btn-nuova-citazione">un'altra</button>
      </h2>
      <blockquote class="citazione" id="testo-citazione"></blockquote>
      <p class="autore" id="autore-citazione"></p>
    </section>

  </div>
</div>

<script>
/* ============================================================
   2) PERSONALIZZA CITTA', LINK E CITAZIONI
   ------------------------------------------------------------
   Modifica SOLO i tre blocchi qui sotto.
   Attenzione alla punteggiatura: ogni riga finisce con una
   virgola, e il testo va sempre tra virgolette.
   ============================================================ */

/* --- A) CITTA' DEL METEO ---------------------------------------
   Per cambiare citta' ti servono latitudine e longitudine.
   Come trovarle: vai su https://www.google.com/maps , cerca la
   citta', clicca col tasto destro sul punto -> il primo valore
   del menu sono le due coordinate (es. 43.1107, 12.3908).
   Copiale qui sotto e cambia anche il nome.                       */
const CITTA = {
  nome: "Perugia",
  latitudine: 43.1107,
  longitudine: 12.3908
};

/* --- B) LINK RAPIDI --------------------------------------------
   Ogni riga e' un link: emoji da mostrare, nome, indirizzo.
   Per aggiungerne uno, copia una riga intera e modificala.
   Per toglierne uno, cancella la sua riga.
   Le emoji si inseriscono con il tasto Windows + . (punto).       */
const LINK = [
  { emoji: "\u{1F4E7}", nome: "Gmail",     url: "https://mail.google.com" },
  { emoji: "\u{1F4C5}", nome: "Calendar",  url: "https://calendar.google.com" },
  { emoji: "\u{1F5C2}", nome: "Drive",     url: "https://drive.google.com" },
  { emoji: "\u{1F4FA}", nome: "YouTube",   url: "https://www.youtube.com" },
  { emoji: "\u{1F419}", nome: "GitHub",    url: "https://github.com" },
  { emoji: "\u{1F4F0}", nome: "Notizie",   url: "https://news.google.com" },
  { emoji: "\u{1F3E0}", nome: "Home Ass.", url: "https://peppe.shadowbreaker.ovh" },
  { emoji: "\u{1F916}", nome: "Claude",    url: "https://claude.ai" }
];

/* --- B-bis) CATEGORIA DI NOTIZIE MOSTRATA ALL'APERTURA ---------
   Valori possibili: "ultimaora", "umbria", "cronaca", "politica",
   "economia", "mondo", "tecnologia", "sport".
   Puoi comunque cambiarla al volo coi pulsanti nella scheda: la
   pagina si ricorda l'ultima che hai scelto.                      */
const CATEGORIA_NEWS = "ultimaora";

/* --- C) CITAZIONI ----------------------------------------------
   Aggiungi o togli righe come vuoi. Ne viene mostrata una a caso
   ad ogni apertura della pagina.                                  */
const CITAZIONI = [
  { testo: "La qualita' non e' un atto, e' un'abitudine.", autore: "Aristotele" },
  { testo: "Fatto e' meglio che perfetto.", autore: "Sheryl Sandberg" },
  { testo: "Il modo migliore per iniziare e' smettere di parlarne e cominciare a fare.", autore: "Walt Disney" },
  { testo: "Non e' che io sia tanto intelligente, e' che resto con i problemi piu' a lungo.", autore: "Albert Einstein" },
  { testo: "Un viaggio di mille miglia comincia con un solo passo.", autore: "Lao Tzu" },
  { testo: "La semplicita' e' la massima sofisticazione.", autore: "Leonardo da Vinci" },
  { testo: "Chi non fa errori di solito non fa nulla.", autore: "William Connor Magee" },
  { testo: "L'unico modo di fare un ottimo lavoro e' amare quello che fai.", autore: "Steve Jobs" },
  { testo: "Comincia da dove sei, usa quello che hai, fai quello che puoi.", autore: "Arthur Ashe" },
  { testo: "Il tempo che ti diverti a perdere non e' tempo perso.", autore: "Bertrand Russell" }
];

/* ============================================================
   FINE DELLA PARTE DA PERSONALIZZARE.
   Da qui in poi c'e' il motore della pagina: puoi leggerlo per
   curiosita' ma non serve modificarlo.
   ============================================================ */


/* ------------------------------------------------------------
   SEZIONE 1 - OROLOGIO, DATA E SALUTO
   ------------------------------------------------------------
   La funzione viene richiamata una volta al secondo, cosi' i
   secondi dell'orologio avanzano da soli.
   ------------------------------------------------------------ */
function aggiornaOrologio() {
  const adesso = new Date();               // l'istante attuale del computer

  // toLocaleTimeString("it-IT") formatta l'ora all'italiana (24 ore).
  document.getElementById("orologio").textContent =
    adesso.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

}

   localStorage e' un piccolo archivio del browser: quello che

/* ------------------------------------------------------------
   SEZIONE 3-ter - TIMER
   ------------------------------------------------------------
   Logica: teniamo un numero (i secondi che mancano) e lo facciamo
   scendere di 1 ogni secondo. Quando arriva a zero suoniamo.

   Nota importante: NON usiamo il contatore per misurare il tempo
   vero, perche' setInterval non e' preciso al millisecondo e i
   browser rallentano le schede in secondo piano. Ci segniamo
   invece l'ORARIO DI FINE e ad ogni giro calcoliamo quanto manca.
   Cosi' il timer resta esatto anche se cambi scheda.
   ------------------------------------------------------------ */

let durataScelta   = 25 * 60;   // durata impostata, in secondi
let secondiRimasti = durataScelta;
let orarioFine     = null;      // istante in cui il timer scadra'
let motoreTimer    = null;      // il "ripetitore" attivo, se in marcia
let giriFatti      = 0;         // quante volte hai portato a termine un timer

const scheda   = document.getElementById("scheda-timer");
const display  = document.getElementById("display-timer");
const btnAvvia = document.getElementById("btn-avvia");

/* Trasforma 90 secondi in "01:30".
   padStart(2, "0") aggiunge uno zero davanti se serve (7 -> "07"). */
function formattaTempo(secondi) {
  const minuti = Math.floor(secondi / 60);
  const resto  = secondi % 60;             // % da' il resto della divisione
  return String(minuti).padStart(2, "0") + ":" + String(resto).padStart(2, "0");
}

function disegnaTimer() {
  display.textContent = formattaTempo(secondiRimasti);

  // Mostriamo il conto alla rovescia anche nel titolo della scheda del
  // browser, cosi' lo vedi anche mentre lavori su un'altra pagina.
  document.title = motoreTimer
    ? formattaTempo(secondiRimasti) + " - dashboard"
    : "La mia dashboard";

  // classList aggiunge/toglie le classi CSS che cambiano l'aspetto.
  scheda.classList.toggle("in-pausa",    !motoreTimer && secondiRimasti !== durataScelta);
  scheda.classList.toggle("in-scadenza", motoreTimer && secondiRimasti <= 60);

  document.getElementById("giri-timer").textContent = giriFatti ? giriFatti + " ✓" : "";
}

/* Suono di fine: lo generiamo al volo col browser (Web Audio),
   cosi' non serve nessun file audio esterno. Tre brevi "bip". */
function suonaFine() {
  try {
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.35, 0.7].forEach(function (ritardo) {
      const oscillatore = audio.createOscillator();
      const volume      = audio.createGain();
      oscillatore.connect(volume);
      volume.connect(audio.destination);
      oscillatore.frequency.value = 880;        // altezza della nota (Hz)
      volume.gain.setValueAtTime(0.25, audio.currentTime + ritardo);
      // Facciamo sfumare il volume a zero, altrimenti si sente un "clic".
      volume.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + ritardo + 0.3);
      oscillatore.start(audio.currentTime + ritardo);
      oscillatore.stop(audio.currentTime + ritardo + 0.3);
    });
  } catch (e) {
    /* Se il browser blocca l'audio pazienza: il timer funziona lo stesso. */
  }
}

function fermaTimer() {
  clearInterval(motoreTimer);
  motoreTimer = null;
  btnAvvia.textContent = "Avvia";
}

function avviaTimer() {
  // Calcoliamo l'orario esatto in cui dovra' scadere.
  orarioFine = Date.now() + secondiRimasti * 1000;
  btnAvvia.textContent = "Pausa";

  motoreTimer = setInterval(function () {
    // Quanto manca davvero, in base all'orologio (non al conteggio dei giri).
    secondiRimasti = Math.round((orarioFine - Date.now()) / 1000);

    if (secondiRimasti <= 0) {
      secondiRimasti = 0;
      fermaTimer();
      giriFatti++;
      disegnaTimer();
      suonaFine();
      document.title = "⏰ Tempo scaduto!";
      // Torniamo pronti per un nuovo giro dopo qualche secondo.
      setTimeout(function () {
        secondiRimasti = durataScelta;
        disegnaTimer();
      }, 5000);
      return;
    }
    disegnaTimer();
  }, 250);   // controlliamo 4 volte al secondo: il display resta fluido

  disegnaTimer();
}

// Il pulsante grande fa sia Avvia sia Pausa, a seconda dello stato.
btnAvvia.onclick = function () {
  if (motoreTimer) { fermaTimer(); } else { avviaTimer(); }
  disegnaTimer();
};

document.getElementById("btn-azzera").onclick = function () {
  fermaTimer();
  secondiRimasti = durataScelta;
  disegnaTimer();
};

/* Pulsanti delle durate (25 / 5 / 15 / 50 minuti).
   querySelectorAll prende TUTTI gli elementi che corrispondono. */
document.querySelectorAll(".timer-preset .mini-bottone").forEach(function (pulsante) {
  pulsante.onclick = function () {
    fermaTimer();
    // getAttribute legge il valore che avevamo scritto nell'HTML.
    // Number() lo trasforma da testo a numero.
    durataScelta   = Number(pulsante.getAttribute("data-minuti")) * 60;
    secondiRimasti = durataScelta;
    document.getElementById("fase-timer").textContent = pulsante.getAttribute("data-fase");

    // Evidenziamo il pulsante scelto togliendo l'evidenza agli altri.
    document.querySelectorAll(".timer-preset .mini-bottone")
      .forEach(function (altro) { altro.classList.remove("attivo"); });
    pulsante.classList.add("attivo");

    disegnaTimer();
  };
});

/* ------------------------------------------------------------
   SEZIONE 4-ter - CAMBIO EURO / YEN CON ANDAMENTO SETTIMANALE
   ------------------------------------------------------------
   I dati arrivano da Frankfurter, che ripubblica i cambi
   ufficiali della Banca Centrale Europea: gratuito, senza chiave.

   Due cose da sapere sui dati della BCE:
   - vengono pubblicati una volta al giorno, verso le 16:00
   - NON esistono per sabato, domenica e festivi (mercati chiusi)
   Percio' di domenica il valore piu' recente e' quello di venerdi'.
   La pagina mostra sempre la data del dato, per non ingannare.
   ------------------------------------------------------------ */

const API_CAMBIO = "https://api.frankfurter.dev/v1/";

/* Formatta un numero all'italiana: 185.65 -> "185,65" */
function numeroIta(valore, decimali) {
  return valore.toLocaleString("it-IT", {
    minimumFractionDigits: decimali,
    maximumFractionDigits: decimali
  });
}

/* Disegna il grafichino (sparkline).

   Perche' calcoliamo le coordinate in JavaScript invece di lasciar
   fare allo scaling automatico dell'SVG: se si allunga un disegno
   solo in orizzontale, i cerchi diventano ovali e le linee cambiano
   spessore. Misurando la larghezza reale e disegnando in pixel veri
   il grafico resta pulito a qualsiasi dimensione.                  */
function disegnaGrafico(punti, contenitore) {
  const larghezza = contenitore.clientWidth || 300;
  const altezza   = 70;
  const margine   = 8;   // spazio ai bordi, per non tagliare il pallino

  const valori = punti.map(function (p) { return p.valore; });
  const minimo = Math.min.apply(null, valori);
  const massimo = Math.max.apply(null, valori);
  // Se in una settimana il cambio non si e' mosso per niente
  // eviteremmo una divisione per zero: mettiamo un minimo di scala.
  const escursione = (massimo - minimo) || 1;

  // Da valore a coordinata sullo schermo.
  const x = function (i) {
    return margine + (i / Math.max(punti.length - 1, 1)) * (larghezza - margine * 2);
  };
  const y = function (v) {
    // Nell'SVG la y cresce verso il BASSO, quindi il valore piu'
    // alto deve avere la y piu' piccola: per questo "1 - ...".
    return margine + (1 - (v - minimo) / escursione) * (altezza - margine * 2);
  };

  const coordinate = punti.map(function (p, i) { return x(i) + "," + y(p.valore); });

  // Area sfumata sotto la linea: chiude il tracciato fino alla base.
  const areaSotto = "M" + coordinate.join(" L") +
                    " L" + x(punti.length - 1) + "," + altezza +
                    " L" + x(0) + "," + altezza + " Z";

  const ultimo = punti[punti.length - 1];

  let svg =
    '<svg viewBox="0 0 ' + larghezza + ' ' + altezza + '" ' +
         'width="' + larghezza + '" height="' + altezza + '" ' +
         'role="img" aria-label="Andamento del cambio euro yen negli ultimi 7 giorni, ' +
         'da ' + numeroIta(punti[0].valore, 2) + ' a ' + numeroIta(ultimo.valore, 2) + ' yen">' +
      '<defs>' +
        '<linearGradient id="sfumatura-cambio" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%"   stop-color="#46e0b8" stop-opacity=".28"/>' +
          '<stop offset="100%" stop-color="#46e0b8" stop-opacity="0"/>' +
        '</linearGradient>' +
      '</defs>' +
      '<path d="' + areaSotto + '" fill="url(#sfumatura-cambio)"/>' +
      // La linea: 2px, senza spigoli vivi agli angoli.
      '<path d="M' + coordinate.join(" L") + '" fill="none" stroke="#46e0b8" ' +
            'stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      // Pallino sull'ultimo valore, cerchiato del colore della scheda
      // per staccarlo dalla linea.
      '<circle cx="' + x(punti.length - 1) + '" cy="' + y(ultimo.valore) + '" r="4" ' +
              'fill="#46e0b8" stroke="#191d33" stroke-width="2"/>';

  // Zone invisibili sensibili al passaggio del mouse, una per punto.
  // Sono piu' larghe del punto stesso, cosi' e' facile centrarle.
  punti.forEach(function (p, i) {
    const passo = (larghezza - margine * 2) / Math.max(punti.length - 1, 1);
    svg += '<rect class="zona-cambio" data-i="' + i + '" ' +
                 'x="' + (x(i) - passo / 2) + '" y="0" ' +
                 'width="' + passo + '" height="' + altezza + '" ' +
                 'fill="transparent" style="cursor:crosshair"/>';
  });

  svg += "</svg>";
  return svg;
}

async function caricaCambio() {
  const contenitore = document.getElementById("cambio-contenuto");

  try {
    // Chiediamo una finestra di 10 giorni: servono per essere sicuri
    // di raccogliere almeno 5 giorni lavorativi anche con un festivo
    // di mezzo. Il grafico poi mostra gli ultimi 7 giorni di dati.
    const oggi = new Date();
    const inizio = new Date(oggi.getTime() - 12 * 24 * 60 * 60 * 1000);
    const gg = function (d) { return d.toISOString().slice(0, 10); };  // "2026-07-19"

    const risposta = await fetch(API_CAMBIO + gg(inizio) + ".." + gg(oggi) + "?base=EUR&symbols=JPY");
    if (!risposta.ok) throw new Error("risposta non valida");
    const dati = await risposta.json();

    // I dati arrivano come oggetto {data: {JPY: valore}}: li
    // trasformiamo in un elenco ordinato per data.
    let punti = Object.keys(dati.rates).sort().map(function (data) {
      return { data: data, valore: dati.rates[data].JPY };
    });
    if (punti.length === 0) throw new Error("nessun dato");

    punti = punti.slice(-7);   // gli ultimi 7 rilevamenti

    const ultimo  = punti[punti.length - 1];
    const primo   = punti[0];
    const delta   = ultimo.valore - primo.valore;
    const deltaPc = (delta / primo.valore) * 100;
    const freccia = delta > 0 ? "↑" : (delta < 0 ? "↓" : "→");
    const segno   = delta > 0 ? "+" : (delta < 0 ? "−" : "");

    const valori  = punti.map(function (p) { return p.valore; });
    const minimo  = Math.min.apply(null, valori);
    const massimo = Math.max.apply(null, valori);

    // Data del dato piu' recente, scritta per esteso.
    const dataUltimo = new Date(ultimo.data + "T12:00:00")
      .toLocaleDateString("it-IT", { weekday: "short", day: "numeric", month: "short" });

    contenitore.innerHTML =
      '<div class="cambio-valore">' + numeroIta(ultimo.valore, 2) +
        '<span class="cambio-unita">¥ per 1 €</span></div>' +
      '<div class="cambio-delta">' + freccia + ' ' + segno +
        numeroIta(Math.abs(delta), 2) + ' (' + segno + numeroIta(Math.abs(deltaPc), 2) +
        '%) in 7 giorni</div>' +
      '<div class="cambio-grafico" id="grafico-cambio">' +
        '<div class="cambio-tooltip" id="tooltip-cambio"></div>' +
      '</div>' +
      '<div class="cambio-note">' +
        '<span>min ' + numeroIta(minimo, 2) + '</span>' +
        '<span>max ' + numeroIta(massimo, 2) + '</span>' +
        '<span>dato di ' + dataUltimo + ' &middot; BCE</span>' +
      '</div>';

    const riquadro = document.getElementById("grafico-cambio");
    const tooltip  = document.getElementById("tooltip-cambio");

    function ridisegna() {
      // Togliamo il vecchio SVG (se c'e') e ne mettiamo uno nuovo
      // calcolato sulla larghezza attuale.
      const vecchio = riquadro.querySelector("svg");
      if (vecchio) vecchio.remove();
      riquadro.insertAdjacentHTML("beforeend", disegnaGrafico(punti, riquadro));

      // Colleghiamo il tooltip alle zone sensibili.
      riquadro.querySelectorAll(".zona-cambio").forEach(function (zona) {
        zona.onmouseenter = function () {
          const p = punti[Number(zona.getAttribute("data-i"))];
          const giorno = new Date(p.data + "T12:00:00")
            .toLocaleDateString("it-IT", { weekday: "short", day: "numeric", month: "short" });
          tooltip.innerHTML = giorno + " &middot; <b>" + numeroIta(p.valore, 2) + "</b> ¥";
          // Posizioniamo il riquadro sopra il punto.
          tooltip.style.left = (Number(zona.getAttribute("x")) + Number(zona.getAttribute("width")) / 2) + "px";
          tooltip.style.top  = "50%";
          tooltip.classList.add("visibile");
        };
        zona.onmouseleave = function () { tooltip.classList.remove("visibile"); };
      });
    }

    ridisegna();

    // Se ridimensioni la finestra ridisegniamo, ma non ad ogni
    // singolo pixel: aspettiamo che ti fermi (stesso trucco delle note).
    let attesaRidisegno = null;
    window.addEventListener("resize", function () {
      clearTimeout(attesaRidisegno);
      attesaRidisegno = setTimeout(ridisegna, 200);
    });

  } catch (errore) {
    contenitore.innerHTML =
      '<p class="vuoto">Cambio non disponibile al momento.</p>';
  }
}

caricaCambio();
setInterval(caricaCambio, 60 * 60 * 1000);   // ricontrolla ogni ora
document.getElementById("btn-aggiorna-cambio").onclick = caricaCambio;


/* ------------------------------------------------------------
   SEZIONE 4-bis - NOTIZIE ANSA
   ------------------------------------------------------------
   Una pagina web NON puo' leggere direttamente il feed dell'ANSA:
   il browser lo vieta per una regola di sicurezza (si chiama CORS)
   e il sito ANSA non autorizza altri siti a leggerlo via
   JavaScript. Provare a farlo da' errore, sempre.

   Come giriamo l'ostacolo: uno script (aggiorna_news.py) gira sui
   computer di GitHub ogni mezz'ora, scarica i feed e ne deposita
   una copia in news.json accanto alla pagina. Da li' possiamo
   leggerla senza problemi, perche' e' "casa nostra".
   ------------------------------------------------------------ */

/* Dove sta il file delle notizie.
   Se apri la pagina dal tuo disco (indirizzo che inizia per "file:")
   non c'e' nessun news.json accanto, quindi lo prendiamo da GitHub.
   Se invece sei sul sito pubblicato, basta il nome del file.        */
const FONTE_NEWS = (location.protocol === "file:")
  ? "https://gvasta62.github.io/dashboard-personale/news.json"
  : "news.json";

let categoriaAttiva = localStorage.getItem("dashboard-news-cat") || CATEGORIA_NEWS;
let notizie = null;   // qui terremo i dati una volta scaricati

/* Trasforma una data in "3 min fa", "2 ore fa", "ieri"...
   E' piu' leggibile di un orario secco accanto a un titolo. */
function quantoTempoFa(dataIso) {
  if (!dataIso) return "";
  const minuti = Math.floor((Date.now() - new Date(dataIso)) / 60000);
  if (minuti < 1)    return "ora";
  if (minuti < 60)   return minuti + " min fa";
  const ore = Math.floor(minuti / 60);
  if (ore < 24)      return ore + (ore === 1 ? " ora fa" : " ore fa");
  const giorni = Math.floor(ore / 24);
  return giorni === 1 ? "ieri" : giorni + " giorni fa";
}

function disegnaNews() {
  const elenco = document.getElementById("elenco-news");
  const barra  = document.getElementById("categorie-news");

  if (!notizie) return;

  // --- I pulsanti delle categorie ---
  barra.innerHTML = "";
  Object.keys(notizie.categorie).forEach(function (chiave) {
    const pulsante = document.createElement("button");
    pulsante.className = "mini-bottone" + (chiave === categoriaAttiva ? " attivo" : "");
    pulsante.textContent = notizie.categorie[chiave].nome;
    pulsante.onclick = function () {
      categoriaAttiva = chiave;
      // Ci ricordiamo la scelta per la prossima apertura.
      localStorage.setItem("dashboard-news-cat", chiave);
      disegnaNews();
    };
    barra.appendChild(pulsante);
  });

  // --- I titoli ---
  // Se la categoria salvata non esiste piu', ripieghiamo sulla prima.
  const categoria = notizie.categorie[categoriaAttiva]
                 || notizie.categorie[Object.keys(notizie.categorie)[0]];

  elenco.innerHTML = "";
  categoria.voci.forEach(function (voce) {
    const riga = document.createElement("li");
    const link = document.createElement("a");
    link.href = voce.link;
    link.target = "_blank";      // le notizie si aprono in una scheda nuova
    link.rel = "noopener";       // accorgimento di sicurezza per target="_blank"

    const ora = document.createElement("span");
    ora.className = "news-ora";
    ora.textContent = quantoTempoFa(voce.data);

    link.appendChild(ora);
    // Il titolo lo aggiungiamo come testo semplice (non come HTML):
    // cosi' eventuali caratteri strani restano innocui.
    link.appendChild(document.createTextNode(voce.titolo));

    riga.appendChild(link);
    elenco.appendChild(riga);
  });

  document.getElementById("stato-news").textContent =
    "aggiornate " + quantoTempoFa(notizie.aggiornato);
}

async function caricaNews() {
  try {
    // "?t=" + un numero che cambia serve a evitare che il browser
    // ci ridia la copia vecchia tenuta in memoria (la cache).
    const risposta = await fetch(FONTE_NEWS + "?t=" + Date.now());
    if (!risposta.ok) throw new Error("file non trovato");
    notizie = await risposta.json();
    disegnaNews();
  } catch (errore) {
    document.getElementById("elenco-news").innerHTML =
      '<li class="vuoto">Notizie non disponibili al momento.</li>';
  }
}

caricaNews();
setInterval(caricaNews, 15 * 60 * 1000);   // ricontrolla ogni 15 minuti


/* ------------------------------------------------------------
   SEZIONE 5 - CITAZIONE CASUALE
   ------------------------------------------------------------
   Math.random() da' un numero a caso fra 0 e 1; moltiplicandolo
   per il numero di citazioni e arrotondando per difetto
   (Math.floor) otteniamo una posizione valida nell'elenco.
   ------------------------------------------------------------ */
function mostraCitazione() {
  const posizione = Math.floor(Math.random() * CITAZIONI.length);
  const scelta = CITAZIONI[posizione];
  document.getElementById("testo-citazione").textContent = "“" + scelta.testo + "”";
  document.getElementById("autore-citazione").textContent = "— " + scelta.autore;
}

mostraCitazione();
document.getElementById("btn-nuova-citazione").onclick = mostraCitazione;
</script>
